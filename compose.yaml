services:
  temporal:
    image: temporalio/temporal
    ports:
      - "7233:7233"
      - "8233:8233"
    command: server start-dev --ip 0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "temporal operator cluster health"]
      interval: 10s
      timeout: 10s
      retries: 3

  # Two separate worker services instead of deploy.replicas so that each
  # instance gets a distinct hostname, visible in Temporal and in the logs.
  worker-1:
    container_name: worker-1
    hostname: worker-1
    build: &worker-build
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env
    environment: &worker-env
      - TEMPORAL_ADDRESS=temporal:7233
    restart: on-failure
    depends_on: &worker-deps
      temporal:
        condition: service_healthy
    volumes: &worker-volumes
      - illustrations:/app/static/illustrations

  worker-2:
    container_name: worker-2
    hostname: worker-2
    build: *worker-build
    env_file: .env
    environment: *worker-env
    restart: on-failure
    depends_on: *worker-deps
    volumes: *worker-volumes

  webui:
    build:
      context: .
      dockerfile: Dockerfile.webui
    env_file: .env
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    ports:
      - "8000:8000"
    restart: on-failure
    depends_on:
      temporal:
        condition: service_healthy
    volumes:
      - illustrations:/app/static/illustrations

volumes:
  illustrations:
