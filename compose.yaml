services:
  temporal:
    image: temporalio/temporal
    ports:
      - "7233:7233"
      - "8233:8233"
    command: server start-dev --ip 0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "temporal operator cluster health"]
      interval: 10s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    restart: on-failure
    depends_on:
      temporal:
        condition: service_healthy
    volumes:
      - illustrations:/app/static/illustrations
    deploy:
      replicas: 2

  webui:
    build:
      context: .
      dockerfile: Dockerfile.webui
    env_file: .env
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    ports:
      - "8000:8000"
    restart: on-failure
    depends_on:
      temporal:
        condition: service_healthy
    volumes:
      - illustrations:/app/static/illustrations

volumes:
  illustrations:
