services:
  temporal:
    image: temporalio/temporal:1.7.0
    pull_policy: missing
    command:
      - server
      - start-dev
      - --ip
      - 0.0.0.0
    ports:
      - "7233:7233" # gRPC — workers & clients
      - "8233:8233" # Web UI — http://localhost:8233
    healthcheck:
      test: ["CMD-SHELL", "temporal operator cluster health"]
      interval: 10s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      temporal:
        condition: service_healthy
    volumes:
      - illustrations:/app/static/illustrations
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  webui:
    build:
      context: .
      dockerfile: Dockerfile.webui
    env_file: .env
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "8000:8000" # http — Web UI
    depends_on:
      temporal:
        condition: service_healthy
    volumes:
      - illustrations:/app/static/illustrations
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

volumes:
  illustrations:
