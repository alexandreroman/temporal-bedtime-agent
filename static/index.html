<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bedtime Story Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    surface: { 1: '#141414', 2: '#1A1A1A', 3: '#1E1E1E', 4: '#242424' },
                    edge: { DEFAULT: '#2D2D2D', light: '#333' },
                    accent: { DEFAULT: '#00C895', hover: '#00B383' },
                    muted: { DEFAULT: '#999', dim: '#555' },
                },
                fontFamily: {
                    sans: ['Inter', 'system-ui', 'sans-serif'],
                    serif: ['Lora', 'Georgia', 'serif'],
                },
            },
        },
    }
    </script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-surface-1 text-gray-200 h-screen flex flex-col font-sans antialiased overflow-hidden">

    <header class="bg-surface-2 border-b border-edge px-6 py-3 shrink-0">
        <div class="flex items-center justify-between w-full">
            <div class="flex items-center gap-2.5">
                <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                    <path d="M22 16.73A10 10 0 0 1 11.27 6a10 10 0 1 0 10.73 10.73Z" fill="white" opacity="0.2" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M20.5 4.5L20.5 8.5M22.5 6.5L18.5 6.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                    <circle cx="25" cy="11" r="1" fill="white"/>
                </svg>
                <a href="/" class="text-lg font-semibold tracking-tight hover:text-white">Bedtime Story Agent</a>
            </div>
            <div class="flex items-center gap-2 hidden lg:flex">
                <p class="text-xs text-muted-dim uppercase tracking-wider">Durable Execution powered by</p>
                <img src="/static/temporal-logo.png" alt="Temporal" class="h-8">
            </div>
        </div>
    </header>

    <main class="flex flex-1 overflow-hidden h-[calc(100vh-53px)] max-lg:flex-col max-lg:overflow-y-auto">

        <section id="chat-panel" class="flex-1 flex flex-col bg-surface-1 border-r border-edge min-w-0 max-w-[600px] overflow-hidden max-lg:max-w-full max-lg:min-h-[60vh] max-lg:border-r-0 max-lg:border-b max-lg:border-edge">
            <div class="flex-1 overflow-y-auto p-5 flex flex-col gap-4 scrollbar-thin min-h-0" id="chat-messages">
                <div id="restart-link" class="flex justify-center pt-1 pb-1">
                    <a href="/" class="flex items-center gap-2 px-5 py-2.5 rounded-full bg-accent text-black font-medium text-sm no-underline transition-all hover:brightness-110 hover:scale-105 active:scale-95">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="1 4 1 10 7 10"></polyline>
                            <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
                        </svg>
                        Create a new story
                    </a>
                </div>
            </div>
            <div id="chat-input-bar" class="flex items-center gap-2 p-3 bg-surface-2 border-t border-edge shrink-0">
                <input
                    type="text"
                    id="chat-input"
                    placeholder="Describe your story idea..."
                    autocomplete="off"
                    class="flex-1 px-4 py-2.5 border border-edge rounded-full bg-surface-1 text-gray-200 text-sm font-sans outline-none transition-colors focus:border-accent placeholder:text-muted-dim disabled:opacity-40"
                />
                <button id="send-btn" onclick="sendMessage()"
                    class="w-9 h-9 flex items-center justify-center rounded-full bg-accent text-black shrink-0 cursor-pointer transition-all hover:bg-accent-hover hover:scale-105 active:scale-95 disabled:opacity-30 disabled:cursor-not-allowed">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </section>

        <section class="flex-1 overflow-y-auto py-8 px-10 bg-surface-2 min-w-0 min-h-0 scrollbar-thin max-lg:min-h-[50vh] max-lg:p-6">
            <div id="story-placeholder" class="flex items-center justify-center h-full">
                <div class="flex flex-col items-center gap-4">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#2D2D2D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                    </svg>
                    <p class="text-muted-dim text-sm max-w-60 text-center leading-relaxed">Your story will appear here as the conversation unfolds...</p>
                </div>
            </div>
            <div id="story-content" style="display:none">
                <h2 id="story-title" class="story-hidden font-serif text-3xl font-medium text-center mb-8 tracking-tight relative pb-4 after:content-[''] after:absolute after:bottom-0 after:left-1/2 after:-translate-x-1/2 after:w-12 after:h-0.5 after:bg-accent after:rounded-full max-lg:text-2xl"></h2>
                <div class="story-hidden flex justify-center mb-8">
                    <div id="story-illustration" class="w-[512px] h-[512px] max-w-full rounded-xl border border-edge">
                        <div id="illust-placeholder" class="h-full bg-surface-4 rounded-xl flex items-center justify-center p-6">
                            <span class="text-muted-dim text-sm text-center italic">The illustration will be generated once the story is complete</span>
                        </div>
                        <div id="illust-loader" style="display:none" class="h-full bg-surface-4 flex flex-col items-center justify-center gap-3 p-6 rounded-xl">
                            <svg class="illust-spin" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#00C895" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
                            </svg>
                            <span class="text-muted-dim text-sm">Generating illustration</span>
                        </div>
                    </div>
                </div>
                <div id="story-text" class="story-hidden story-text font-serif text-[17px] leading-[1.85] text-gray-200 whitespace-pre-wrap max-w-xl mx-auto text-justify"></div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
